name: refresh-data

on:
  schedule:
    - cron: '17 6 * * *' # daily 06:17 UTC (off-peak minute)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Fetch latest data
        run: npm run fetch

      - name: Commit data changes
        run: |
          git config user.name "macro-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "no data changes"
          else
            git commit -m "data: daily refresh $(date -u +%F)"
            git push
          fi

      - name: Build static export
        run: npm run build:pages

      - name: Deploy to gh-pages
        run: |
          git config user.name "macro-lab-bot"
          git config user.email "bot@users.noreply.github.com"
          git fetch origin gh-pages
          git worktree add /tmp/gh-pages origin/gh-pages
          rm -rf /tmp/gh-pages/* /tmp/gh-pages/.nojekyll 2>/dev/null || true
          cp -r out/. /tmp/gh-pages/
          cd /tmp/gh-pages
          git add -A
          if git diff --cached --quiet; then
            echo "site unchanged"
          else
            git commit -m "deploy: $(date -u +%F\ %H:%M) UTC"
            git push origin HEAD:gh-pages
          fi
